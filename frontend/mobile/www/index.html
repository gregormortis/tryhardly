<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>TryHardly</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #09090b;
        color: #fafafa;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .wrap { padding: 24px; max-width: 320px; }
      img { width: 96px; height: 96px; border-radius: 22px; margin-bottom: 16px; }
      a { color: #818cf8; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <img src="icon-512.png" alt="TryHardly" />
      <h1>TryHardly</h1>
      <p>Connecting&hellip; If the app does not load, check your connection or open
        <a href="https://www.tryhardly.com">tryhardly.com</a>.</p>
    </div>
    <script>
      // The native shell normally loads the live site via Capacitor's server.url.
      // This page is only shown as a bundled fallback; redirect if reachable.
      try {
        fetch('https://www.tryhardly.com', { mode: 'no-cors' })
          .then(function () { window.location.href = 'https://www.tryhardly.com'; })
          .catch(function () {});
      } catch (e) {}
    </script>
  </body>
</html>
